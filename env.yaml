name: beyond-tie-points
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0

  # Core scientific stack
  - numpy=1.26.*
  - scipy=1.11.*
  - pandas=2.1.*
  - scikit-learn=1.3.*
  - scikit-image=0.22.*
  - matplotlib=3.8.*
  - h5py=3.10.*

  # Geospatial stack
  - rasterio=1.3.*
  - pyproj=3.6.*
  - shapely=2.0.*

  # Image I/O
  - pillow=10.*

  # Deep learning stack (CUDA 12.1 build)
  - pytorch=2.2.*
  - torchvision=0.17.*
  - pytorch-cuda=12.1

  # Utilities
  - tqdm=4.66.*

  # Packages without reliable conda builds in all environments
  - pip:
      - opencv-python-headless==4.9.0.80
      - pykeops==2.2.3
